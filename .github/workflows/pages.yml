name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Copy Functions to output
        run: cp -r apps/web/functions apps/web/out/functions

      - name: Deploy to Cloudflare Pages
        working-directory: apps/web
        run: |
          set -x
          echo "=== Before sed ==="
          grep -n "workspaces" ../../package.json || true
          sed -i 's/"workspaces":/"_workspaces_disabled":/' ../../package.json
          echo "=== After sed ==="
          grep -n "workspaces" ../../package.json || true
          npx wrangler pages deploy out --project-name=ai-engineer-toolbox --branch=main
          sed -i 's/"_workspaces_disabled":/"workspaces":/' ../../package.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
