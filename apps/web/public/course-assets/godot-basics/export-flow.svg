<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Godot export workflow</title>
  <desc id="desc">A four step workflow for exporting a Godot project: lock editor version, install matching templates, configure preset, and test the exported build.</desc>
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="48" y="68" fill="#0f172a" font-family="Arial, sans-serif" font-size="30" font-weight="700">Godot export checklist</text>
  <g font-family="Arial, sans-serif">
    <rect x="64" y="132" width="180" height="230" rx="14" fill="#ffffff" stroke="#0ea5e9" stroke-width="3"/>
    <circle cx="154" cy="178" r="30" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
    <text x="145" y="188" fill="#075985" font-size="28" font-weight="700">1</text>
    <text x="96" y="240" fill="#0f172a" font-size="20" font-weight="700">Lock version</text>
    <text x="92" y="280" fill="#334155" font-size="17">Use Godot 4.6.3</text>
    <text x="90" y="310" fill="#334155" font-size="17">for editor and project</text>
    <path d="M260 246 H332" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="348" y="132" width="180" height="230" rx="14" fill="#ffffff" stroke="#22c55e" stroke-width="3"/>
    <circle cx="438" cy="178" r="30" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="429" y="188" fill="#166534" font-size="28" font-weight="700">2</text>
    <text x="374" y="240" fill="#0f172a" font-size="20" font-weight="700">Templates</text>
    <text x="382" y="280" fill="#334155" font-size="17">Install matching</text>
    <text x="384" y="310" fill="#334155" font-size="17">4.6.3 templates</text>
    <path d="M544 246 H616" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="632" y="132" width="180" height="230" rx="14" fill="#ffffff" stroke="#f59e0b" stroke-width="3"/>
    <circle cx="722" cy="178" r="30" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text x="713" y="188" fill="#92400e" font-size="28" font-weight="700">3</text>
    <text x="666" y="240" fill="#0f172a" font-size="20" font-weight="700">Preset</text>
    <text x="672" y="280" fill="#334155" font-size="17">Set platform and</text>
    <text x="676" y="310" fill="#334155" font-size="17">export path</text>
    <rect x="240" y="406" width="480" height="72" rx="14" fill="#ffffff" stroke="#64748b" stroke-width="3"/>
    <text x="284" y="450" fill="#0f172a" font-size="22" font-weight="700">4. Run the exported build outside the editor</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
