<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Godot scene and instance relationship</title>
  <desc id="desc">A diagram showing player.tscn as a reusable scene instanced inside main.tscn.</desc>
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="48" y="64" fill="#0f172a" font-family="Arial, sans-serif" font-size="28" font-weight="700">Scenes are reusable node trees</text>
  <rect x="64" y="112" width="330" height="330" rx="14" fill="#ffffff" stroke="#38bdf8" stroke-width="3"/>
  <text x="96" y="156" fill="#075985" font-family="Arial, sans-serif" font-size="24" font-weight="700">player.tscn</text>
  <rect x="112" y="198" width="230" height="50" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="136" y="231" fill="#0f172a" font-family="Arial, sans-serif" font-size="19">Player CharacterBody2D</text>
  <line x1="227" y1="248" x2="227" y2="278" stroke="#0284c7" stroke-width="3"/>
  <rect x="112" y="278" width="230" height="50" rx="8" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="162" y="311" fill="#0f172a" font-family="Arial, sans-serif" font-size="19">ColorRect</text>
  <line x1="227" y1="328" x2="227" y2="358" stroke="#0284c7" stroke-width="3"/>
  <rect x="112" y="358" width="230" height="50" rx="8" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="136" y="391" fill="#0f172a" font-family="Arial, sans-serif" font-size="19">CollisionShape2D</text>
  <path d="M412 276 C462 250 498 250 548 276" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="424" y="238" fill="#334155" font-family="Arial, sans-serif" font-size="20">Instance into</text>
  <rect x="566" y="112" width="330" height="330" rx="14" fill="#ffffff" stroke="#22c55e" stroke-width="3"/>
  <text x="598" y="156" fill="#166534" font-family="Arial, sans-serif" font-size="24" font-weight="700">main.tscn</text>
  <rect x="614" y="198" width="230" height="50" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="690" y="231" fill="#0f172a" font-family="Arial, sans-serif" font-size="19">Main Node2D</text>
  <line x1="729" y1="248" x2="729" y2="278" stroke="#16a34a" stroke-width="3"/>
  <rect x="614" y="278" width="230" height="50" rx="8" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="648" y="311" fill="#0f172a" font-family="Arial, sans-serif" font-size="19">Player instance</text>
  <line x1="729" y1="328" x2="729" y2="358" stroke="#16a34a" stroke-width="3"/>
  <rect x="614" y="358" width="230" height="50" rx="8" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="658" y="391" fill="#0f172a" font-family="Arial, sans-serif" font-size="19">SpawnTimer</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
